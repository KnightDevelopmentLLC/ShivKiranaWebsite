<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>
<body>

<h2>Add Product</h2>

<input id="name" placeholder="Name"><br><br>
<input id="category" placeholder="Category"><br><br>
<input id="price" type="number" placeholder="Price"><br><br>
<input id="qty" type="number" placeholder="Quantity"><br><br>
<input id="image" placeholder="Image URL"><br><br>

<button onclick="addProduct()">Add Product</button>

<h2>Products</h2>
<div id="list"></div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, deleteDoc, doc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const list = document.getElementById("list");

// LIVE DATA
onSnapshot(collection(db,"products"), snap=>{
  list.innerHTML = snap.docs.map(d=>{
    const p = d.data();
    return `
      <div style="border:1px solid #ccc;padding:10px;margin:10px;">
        <b>${p.name}</b> - ₹${p.price}
        <br>
        <button onclick="deleteProduct('${d.id}')">Delete</button>
      </div>
    `;
  }).join("");
});

// ADD PRODUCT
window.addProduct = async () => {
  try {
    const name = document.getElementById("name").value.trim();
    const category = document.getElementById("category").value.trim();
    const price = Number(document.getElementById("price").value);
    const quantity = Number(document.getElementById("qty").value);
    const image = document.getElementById("image").value.trim();

    if (!name || !category || !price || !quantity || !image) {
      alert("Fill all fields properly");
      return;
    }

    await addDoc(collection(db, "products"), {
      name,
      category,
      price,
      quantity,
      image
    });

    alert("Added ✅");

    document.getElementById("name").value = "";
    document.getElementById("category").value = "";
    document.getElementById("price").value = "";
    document.getElementById("qty").value = "";
    document.getElementById("image").value = "";

  } catch (err) {
    console.error(err);
    alert(err.message);
  }
};

// DELETE
window.deleteProduct = async (id) => {
  await deleteDoc(doc(db,"products",id));
};

</script>

</body>
</html>
