<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Shiv Kirana</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ADMIN NAV -->
<nav class="admin-nav">
  <h1>⚙️ Admin Panel — Shiv Kirana</h1>
  <a href="index.html">← View Store</a>
</nav>

<div class="admin-container">

  <!-- ADD / EDIT FORM -->
  <div class="admin-card">
    <h2 id="form-title">➕ Add New Product</h2>
    <input type="hidden" id="edit-id" />

    <div class="form-group">
      <label>Product Name *</label>
      <input type="text" id="f-name" placeholder="e.g., Basmati Rice 1kg" />
    </div>
    <div class="form-group">
      <label>Category *</label>
      <input type="text" id="f-category" placeholder="e.g., Rice & Grains" list="cat-list" autocomplete="off" />
      <datalist id="cat-list"></datalist>
    </div>
    <div class="form-group">
      <label>Price (₹) *</label>
      <input type="number" id="f-price" placeholder="e.g., 120" min="0" step="0.01" />
    </div>
    <div class="form-group">
      <label>Quantity in Stock *</label>
      <input type="number" id="f-quantity" placeholder="e.g., 50" min="0" step="1" />
    </div>
    <div class="form-group">
      <label>Image URL <span style="font-weight:400;color:#999">(optional — Cloudinary)</span></label>
      <input type="url" id="f-imageUrl" placeholder="https://res.cloudinary.com/..." />
    </div>

    <div class="form-actions">
      <button class="btn btn-save" id="save-btn" onclick="saveProduct()">💾 Save Product</button>
      <button class="btn btn-cancel" id="cancel-btn" onclick="cancelEdit()" style="display:none">✕ Cancel</button>
    </div>
    <p id="form-msg" style="margin-top:10px;font-size:.85rem;color:var(--green);font-weight:700;min-height:18px;"></p>
  </div>

  <!-- PRODUCT LIST -->
  <div class="admin-card">
    <h2>📦 All Products &nbsp;<span id="product-count" style="font-weight:400;color:var(--muted);font-size:.9rem"></span></h2>
    <div id="admin-product-list">
      <div class="loading"><div class="spinner"></div>Connecting to Firebase…</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- SCRIPT -->
<script type="module">
  import { db } from "./firebase.js";
  import {
    collection, onSnapshot,
    addDoc, updateDoc, deleteDoc, doc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let allProducts = [];
  let editingId   = null;

  /* ── Firestore listener (NO orderBy — prevents index errors) ── */
  onSnapshot(collection(db, "products"), (snap) => {
    allProducts = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => String(a.name||"").localeCompare(String(b.name||"")));

    renderList();
    updateCatList();
  }, (err) => {
    console.error("Firestore error:", err);
    let msg = "❌ Firebase error: " + err.message;
    if (err.code === "permission-denied")
      msg = "❌ Permission denied. Set Firestore Rules to allow read/write.";
    document.getElementById("admin-product-list").innerHTML =
      `<p style="color:var(--red);font-weight:700;padding:20px 0;">${msg}</p>`;
    showToast(msg);
  });

  /* ── Render product list ── */
  function renderList() {
    const container = document.getElementById("admin-product-list");
    const count     = document.getElementById("product-count");
    count.textContent = `(${allProducts.length} products)`;

    if (!allProducts.length) {
      container.innerHTML = `<p style="color:var(--muted);text-align:center;padding:40px 0;">
        No products yet. Add your first product using the form.</p>`;
      return;
    }

    let html = `<div class="admin-product-list">`;
    allProducts.forEach(p => {
      const img  = p.imageUrl || "https://placehold.co/54x54/e8f5e9/2e7d32?text=?";
      const qty  = Number(p.quantity);
      const stock = qty > 0
        ? `${qty} in stock`
        : `<span class="badge-out">Out of stock</span>`;
      const safeName = escHtml(p.name || "");
      html += `
        <div class="admin-product-item">
          <img src="${escHtml(img)}" alt="${safeName}"
               onerror="this.src='https://placehold.co/54?text=?'"/>
          <div class="admin-item-info">
            <div class="name">${safeName}</div>
            <div class="meta">₹${Number(p.price||0).toFixed(2)} &nbsp;·&nbsp;
              ${escHtml(p.category||"Uncategorized")} &nbsp;·&nbsp; ${stock}</div>
          </div>
          <div class="admin-item-actions">
            <button class="btn-edit" onclick="startEdit('${p.id}')">✏️ Edit</button>
            <button class="btn-del"  onclick="deleteProduct('${p.id}','${safeName.replace(/'/g,"\\'")}')">🗑</button>
          </div>
        </div>`;
    });
    html += `</div>`;
    container.innerHTML = html;
  }

  /* ── Datalist for category suggestions ── */
  function updateCatList() {
    const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))].sort();
    document.getElementById("cat-list").innerHTML =
      cats.map(c => `<option value="${escHtml(c)}">`).join("");
  }

  /* ── Save product (add or update) ── */
  window.saveProduct = async function() {
    const name     = document.getElementById("f-name").value.trim();
    const category = document.getElementById("f-category").value.trim();
    const priceVal = document.getElementById("f-price").value.trim();
    const qtyVal   = document.getElementById("f-quantity").value.trim();
    const imageUrl = document.getElementById("f-imageUrl").value.trim();

    // Validation
    if (!name)     { setMsg("⚠️ Product name is required", "var(--red)"); return; }
    if (!category) { setMsg("⚠️ Category is required", "var(--red)"); return; }
    if (priceVal === "" || isNaN(Number(priceVal)) || Number(priceVal) < 0) {
      setMsg("⚠️ Enter a valid price", "var(--red)"); return;
    }
    if (qtyVal === "" || isNaN(Number(qtyVal)) || Number(qtyVal) < 0) {
      setMsg("⚠️ Enter a valid quantity", "var(--red)"); return;
    }

    const data = {
      name,
      category,
      price:    parseFloat(priceVal),
      quantity: parseInt(qtyVal, 10),
      imageUrl: imageUrl || ""
    };

    const saveBtn = document.getElementById("save-btn");
    saveBtn.textContent = "Saving…";
    saveBtn.disabled = true;

    try {
      if (editingId) {
        await updateDoc(doc(db, "products", editingId), data);
        showToast("✅ Product updated successfully!");
      } else {
        await addDoc(collection(db, "products"), data);
        showToast("✅ Product added successfully!");
      }
      clearForm();
      setMsg("");
    } catch (err) {
      console.error("Save error:", err);
      let errMsg = "❌ Failed to save. Check Firebase config and Firestore Rules.";
      if (err.code === "permission-denied") errMsg = "❌ Permission denied — update Firestore Rules.";
      setMsg(errMsg, "var(--red)");
      showToast("❌ Error saving product");
    } finally {
      saveBtn.disabled = false;
    }
  };

  /* ── Start editing a product ── */
  window.startEdit = function(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    editingId = id;

    document.getElementById("form-title").textContent    = "✏️ Edit Product";
    document.getElementById("f-name").value              = p.name     || "";
    document.getElementById("f-category").value          = p.category || "";
    document.getElementById("f-price").value             = p.price    ?? "";
    document.getElementById("f-quantity").value          = p.quantity ?? "";
    document.getElementById("f-imageUrl").value          = p.imageUrl || "";
    document.getElementById("save-btn").textContent      = "💾 Update Product";
    document.getElementById("cancel-btn").style.display  = "";
    setMsg("");
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  window.cancelEdit = clearForm;

  function clearForm() {
    editingId = null;
    ["f-name","f-category","f-price","f-quantity","f-imageUrl"]
      .forEach(id => document.getElementById(id).value = "");
    document.getElementById("form-title").textContent  = "➕ Add New Product";
    document.getElementById("save-btn").textContent    = "💾 Save Product";
    document.getElementById("save-btn").disabled       = false;
    document.getElementById("cancel-btn").style.display = "none";
    setMsg("");
  }

  /* ── Delete product ── */
  window.deleteProduct = async function(id, name) {
    if (!confirm(`Delete "${name}"?\nThis action cannot be undone.`)) return;
    try {
      await deleteDoc(doc(db, "products", id));
      showToast(`🗑 "${name}" deleted`);
    } catch (err) {
      console.error("Delete error:", err);
      showToast("❌ Error deleting product");
    }
  };

  /* ── Helpers ── */
  function setMsg(msg, color = "var(--green)") {
    const el = document.getElementById("form-msg");
    el.textContent = msg;
    el.style.color = color;
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }

  function escHtml(str) {
    return String(str||"")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  window.showToast = showToast;
</script>

</body>
</html>
