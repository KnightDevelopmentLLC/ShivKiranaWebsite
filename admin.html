<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Shiv Kirana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── ADMIN NAV ──────────────────────────────────────── -->
<nav class="admin-nav">
  <h1>⚙️ Admin Panel — Shiv Kirana</h1>
  <a href="index.html">← View Store</a>
</nav>

<!-- ── MAIN LAYOUT ────────────────────────────────────── -->
<div class="admin-container">

  <!-- ADD / EDIT FORM -->
  <div class="admin-card">
    <h2 id="form-title">➕ Add New Product</h2>

    <input type="hidden" id="edit-id" />

    <div class="form-group">
      <label>Product Name *</label>
      <input type="text" id="f-name" placeholder="e.g., Basmati Rice 1kg" />
    </div>
    <div class="form-group">
      <label>Category *</label>
      <input type="text" id="f-category" placeholder="e.g., Rice & Grains" list="cat-list" />
      <datalist id="cat-list"></datalist>
    </div>
    <div class="form-group">
      <label>Price (₹) *</label>
      <input type="number" id="f-price" placeholder="e.g., 120" min="0" step="0.01" />
    </div>
    <div class="form-group">
      <label>Quantity (Stock) *</label>
      <input type="number" id="f-quantity" placeholder="e.g., 50" min="0" step="1" />
    </div>
    <div class="form-group">
      <label>Image URL (Cloudinary)</label>
      <input type="url" id="f-imageUrl" placeholder="https://res.cloudinary.com/..." />
    </div>

    <div class="form-actions">
      <button class="btn btn-green"   id="save-btn"   onclick="saveProduct()">💾 Save Product</button>
      <button class="btn btn-outline" id="cancel-btn" onclick="cancelEdit()" style="display:none;">Cancel</button>
    </div>
  </div>

  <!-- PRODUCT LIST -->
  <div class="admin-card">
    <h2>📦 All Products (<span id="product-count">0</span>)</h2>
    <div id="admin-product-list">
      <div class="loading"><div class="spinner"></div>Loading…</div>
    </div>
  </div>

</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- ── SCRIPT ─────────────────────────────────────────── -->
<script type="module">
  import { db } from "./firebase.js";
  import {
    collection, onSnapshot, query, orderBy,
    addDoc, updateDoc, deleteDoc, doc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let allProducts = [];
  let editingId   = null;

  /* ── Real-time listener ── */
  const q = query(collection(db, "products"), orderBy("name"));
  onSnapshot(q, (snap) => {
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAdminList();
    updateCatList();
  }, (err) => {
    console.error("Firestore error:", err);
    showToast("❌ Failed to connect to Firebase");
  });

  /* ── Render admin product list ── */
  function renderAdminList() {
    const container = document.getElementById("admin-product-list");
    document.getElementById("product-count").textContent = allProducts.length;

    if (allProducts.length === 0) {
      container.innerHTML = `<p style="color:var(--muted);text-align:center;padding:32px 0;">No products yet. Add your first product!</p>`;
      return;
    }

    let html = `<div class="admin-product-list">`;
    allProducts.forEach(p => {
      const imgSrc = p.imageUrl || "https://via.placeholder.com/56?text=?";
      const stock  = p.quantity > 0 ? `${p.quantity} in stock` : `<span style="color:#e53935">Out of stock</span>`;
      html += `
        <div class="admin-product-item">
          <img src="${imgSrc}" alt="${p.name}"
               onerror="this.src='https://via.placeholder.com/56?text=?'"/>
          <div class="admin-item-info">
            <div class="name">${p.name}</div>
            <div class="meta">₹${Number(p.price).toFixed(2)} · ${p.category || 'Uncategorized'} · ${stock}</div>
          </div>
          <div class="admin-item-actions">
            <button class="btn-edit" onclick="startEdit('${p.id}')">✏️ Edit</button>
            <button class="btn btn-red" onclick="deleteProduct('${p.id}', '${p.name.replace(/'/g,"\\'")}')">🗑</button>
          </div>
        </div>`;
    });
    html += `</div>`;
    container.innerHTML = html;
  }

  /* ── Populate category datalist ── */
  function updateCatList() {
    const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))].sort();
    const dl   = document.getElementById("cat-list");
    dl.innerHTML = cats.map(c => `<option value="${c}">`).join("");
  }

  /* ── Save (add or update) ── */
  window.saveProduct = async function() {
    const name     = document.getElementById("f-name").value.trim();
    const category = document.getElementById("f-category").value.trim();
    const price    = parseFloat(document.getElementById("f-price").value);
    const quantity = parseInt(document.getElementById("f-quantity").value, 10);
    const imageUrl = document.getElementById("f-imageUrl").value.trim();

    if (!name || !category || isNaN(price) || isNaN(quantity)) {
      showToast("⚠️ Please fill in all required fields"); return;
    }
    if (price < 0 || quantity < 0) {
      showToast("⚠️ Price and quantity must be positive"); return;
    }

    const data = { name, category, price, quantity, imageUrl };

    try {
      if (editingId) {
        await updateDoc(doc(db, "products", editingId), data);
        showToast("✅ Product updated!");
      } else {
        await addDoc(collection(db, "products"), data);
        showToast("✅ Product added!");
      }
      clearForm();
    } catch (err) {
      console.error(err);
      showToast("❌ Error saving product");
    }
  };

  /* ── Edit ── */
  window.startEdit = function(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    editingId = id;

    document.getElementById("form-title").textContent    = "✏️ Edit Product";
    document.getElementById("f-name").value              = p.name || "";
    document.getElementById("f-category").value          = p.category || "";
    document.getElementById("f-price").value             = p.price || "";
    document.getElementById("f-quantity").value          = p.quantity ?? "";
    document.getElementById("f-imageUrl").value          = p.imageUrl || "";
    document.getElementById("cancel-btn").style.display  = "inline-flex";
    document.getElementById("save-btn").textContent      = "💾 Update Product";
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  window.cancelEdit = function() { clearForm(); };

  function clearForm() {
    editingId = null;
    ["f-name","f-category","f-price","f-quantity","f-imageUrl"].forEach(id => {
      document.getElementById(id).value = "";
    });
    document.getElementById("form-title").textContent   = "➕ Add New Product";
    document.getElementById("save-btn").textContent     = "💾 Save Product";
    document.getElementById("cancel-btn").style.display = "none";
  }

  /* ── Delete ── */
  window.deleteProduct = async function(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    try {
      await deleteDoc(doc(db, "products", id));
      showToast(`🗑 "${name}" deleted`);
    } catch (err) {
      console.error(err);
      showToast("❌ Error deleting product");
    }
  };

  /* ── Toast ── */
  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2800);
  }
  window.showToast = showToast;
</script>

</body>
</html>
