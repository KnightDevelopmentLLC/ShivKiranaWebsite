<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoreOS · Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & TOKENS ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0f12;
      --surface:   #141820;
      --surface2:  #1c2230;
      --border:    #252d3a;
      --accent:    #f97316;
      --accent2:   #fb923c;
      --text:      #e8edf5;
      --muted:     #6b7a90;
      --danger:    #ef4444;
      --success:   #22c55e;
      --radius:    10px;
      --font:      'Syne', sans-serif;
      --mono:      'DM Mono', monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── SIDEBAR LAYOUT ───────────────────────────────────── */
    .layout { display: flex; flex: 1; }

    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .sidebar-logo {
      padding: 0 24px 28px;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo span { color: var(--accent); }

    .sidebar-nav { padding: 20px 12px; flex: 1; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.18s;
      text-decoration: none;
    }

    .nav-item:hover, .nav-item.active {
      background: var(--surface2);
      color: var(--text);
    }

    .nav-item.active { color: var(--accent); }

    .nav-icon { font-size: 1rem; width: 20px; text-align: center; }

    /* ── MAIN CONTENT ─────────────────────────────────────── */
    .main {
      margin-left: 240px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-title { font-size: 1.1rem; font-weight: 700; }

    .badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .content { padding: 32px; flex: 1; }

    /* ── GRID ─────────────────────────────────────────────── */
    .grid { display: grid; grid-template-columns: 400px 1fr; gap: 28px; align-items: start; }

    /* ── CARD ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-body { padding: 24px; }

    /* ── FORM ─────────────────────────────────────────────── */
    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      padding: 10px 14px;
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249,115,22,.15);
    }

    input::placeholder { color: var(--muted); }

    select option { background: var(--surface2); }

    /* ── BUTTON ───────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-sm { padding: 6px 14px; font-size: 0.78rem; }

    .btn-danger  { background: rgba(239,68,68,.15); color: var(--danger); border: 1px solid rgba(239,68,68,.25); }
    .btn-danger:hover  { background: rgba(239,68,68,.28); }

    .btn-edit { background: rgba(249,115,22,.12); color: var(--accent); border: 1px solid rgba(249,115,22,.22); }
    .btn-edit:hover { background: rgba(249,115,22,.25); }

    /* ── SPINNER ──────────────────────────────────────────── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px; right: 28px;
      padding: 14px 22px;
      border-radius: 9px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #fff;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.28s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #toast.success { background: var(--success); }
    #toast.error   { background: var(--danger); }

    /* ── PRODUCT TABLE ────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead tr { border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,.04); transition: background .14s; }
    tbody tr:hover { background: var(--surface2); }

    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
    }

    td { padding: 10px 14px; vertical-align: middle; }

    .product-thumb {
      width: 42px; height: 42px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--surface2);
    }

    .product-thumb-placeholder {
      width: 42px; height: 42px;
      background: var(--surface2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .price-tag {
      font-family: var(--mono);
      color: var(--accent);
      font-weight: 500;
    }

    .cat-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .empty-state .icon { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    /* ── EDIT MODAL ───────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 440px;
      max-width: calc(100vw - 40px);
      padding: 28px;
      animation: slideUp .22s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .modal-title { font-size: 1rem; font-weight: 700; }

    .close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .close-btn:hover { color: var(--text); }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .btn-outline {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-outline:hover { border-color: var(--text); color: var(--text); }

    .btn-save {
      flex: 2;
      background: var(--accent);
      color: #fff;
    }

    .btn-save:hover { background: var(--accent2); }

    /* ── STATS BAR ────────────────────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
    }

    .stat-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-size: 1.8rem; font-weight: 800; }
    .stat-value.accent { color: var(--accent); }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .grid { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Store<span>OS</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="admin.html">
        <span class="nav-icon">📦</span> Products
      </a>
      <a class="nav-item" href="index.html" target="_blank">
        <span class="nav-icon">🌐</span> View Store
      </a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Product Management</span>
      <span class="badge" id="productCountBadge">0 products</span>
    </div>

    <div class="content">
      <!-- STATS -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">Total Products</div>
          <div class="stat-value accent" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Categories</div>
          <div class="stat-value" id="statCats">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Stock</div>
          <div class="stat-value" id="statStock">0</div>
        </div>
      </div>

      <div class="grid">
        <!-- ADD PRODUCT FORM -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">➕ Add New Product</span>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label for="name">Product Name *</label>
              <input type="text" id="name" placeholder="e.g. Wireless Earbuds" />
            </div>
            <div class="form-group">
              <label for="price">Price (₹) *</label>
              <input type="number" id="price" placeholder="e.g. 1299" min="0" />
            </div>
            <div class="form-group">
              <label for="image">Image URL</label>
              <input type="url" id="image" placeholder="https://example.com/image.jpg" />
            </div>
            <div class="form-group">
              <label for="category">Category</label>
              <select id="category">
                <option value="">— Select Category —</option>
                <option value="Electronics">Electronics</option>
                <option value="Fashion">Fashion</option>
                <option value="Home & Kitchen">Home & Kitchen</option>
                <option value="Sports">Sports</option>
                <option value="Beauty">Beauty</option>
                <option value="Books">Books</option>
                <option value="Toys">Toys</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="quantity">Stock Quantity</label>
              <input type="number" id="quantity" placeholder="e.g. 50" min="0" />
            </div>
            <button class="btn btn-primary" id="addProductBtn">
              <span class="spinner" id="addSpinner"></span>
              <span id="addBtnText">Add Product</span>
            </button>
          </div>
        </div>

        <!-- PRODUCT LIST -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">📋 Product List</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Image</th>
                  <th>Name</th>
                  <th>Price</th>
                  <th>Category</th>
                  <th>Qty</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="productTableBody">
                <tr>
                  <td colspan="6">
                    <div class="empty-state">
                      <span class="icon">📭</span>
                      Loading products…
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ Edit Product</span>
      <button class="close-btn" id="closeModal">✕</button>
    </div>
    <input type="hidden" id="editId" />
    <div class="form-group">
      <label for="editName">Product Name *</label>
      <input type="text" id="editName" />
    </div>
    <div class="form-group">
      <label for="editPrice">Price (₹) *</label>
      <input type="number" id="editPrice" min="0" />
    </div>
    <div class="form-group">
      <label for="editImage">Image URL</label>
      <input type="url" id="editImage" />
    </div>
    <div class="form-group">
      <label for="editCategory">Category</label>
      <select id="editCategory">
        <option value="">— Select Category —</option>
        <option value="Electronics">Electronics</option>
        <option value="Fashion">Fashion</option>
        <option value="Home & Kitchen">Home & Kitchen</option>
        <option value="Sports">Sports</option>
        <option value="Beauty">Beauty</option>
        <option value="Books">Books</option>
        <option value="Toys">Toys</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label for="editQuantity">Stock Quantity</label>
      <input type="number" id="editQuantity" min="0" />
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancelEdit">Cancel</button>
      <button class="btn btn-save" id="saveEditBtn">Save Changes</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════════════════
     FIREBASE + APP LOGIC  (module type — must be at bottom)
════════════════════════════════════════════════════════════ -->
<script type="module">
  // ── Firebase imports ──────────────────────────────────────
  import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    doc,
    updateDoc,
    deleteDoc,
    onSnapshot,
    orderBy,
    query,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ── 🔴 REPLACE WITH YOUR FIREBASE CONFIG ─────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyAzYesdT-95K86IbvyUCPDy0BvGJBtn7Jk",
  authDomain: "shivkirana-bcd14.firebaseapp.com",
  projectId: "shivkirana-bcd14",
  storageBucket: "shivkirana-bcd14.firebasestorage.app",
  messagingSenderId: "523436780783",
  appId: "1:523436780783:web:0f6c69535517bea2b3bf1a"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── DOM refs ──────────────────────────────────────────────
  const addBtn        = document.getElementById("addProductBtn");
  const addSpinner    = document.getElementById("addSpinner");
  const addBtnText    = document.getElementById("addBtnText");
  const tableBody     = document.getElementById("productTableBody");
  const editOverlay   = document.getElementById("editOverlay");
  const closeModalBtn = document.getElementById("closeModal");
  const cancelEditBtn = document.getElementById("cancelEdit");
  const saveEditBtn   = document.getElementById("saveEditBtn");
  const toast         = document.getElementById("toast");

  // ── Toast helper ──────────────────────────────────────────
  function showToast(msg, type = "success") {
    toast.textContent = msg;
    toast.className   = `show ${type}`;
    setTimeout(() => { toast.className = ""; }, 3000);
  }

  // ── ADD PRODUCT ───────────────────────────────────────────
  addBtn.addEventListener("click", async function (e) {
    e.preventDefault();

    const name     = document.getElementById("name").value.trim();
    const price    = document.getElementById("price").value.trim();
    const image    = document.getElementById("image").value.trim();
    const category = document.getElementById("category").value;
    const quantity = document.getElementById("quantity").value.trim();

    if (!name || !price) {
      showToast("Name and Price are required", "error");
      return;
    }

    if (isNaN(parseFloat(price)) || parseFloat(price) < 0) {
      showToast("Enter a valid price", "error");
      return;
    }

    // Show loading state
    addBtn.disabled          = true;
    addSpinner.style.display = "block";
    addBtnText.textContent   = "Saving…";

    try {
      await addDoc(collection(db, "products"), {
        name,
        price:    parseFloat(price),
        image:    image || "",
        category: category || "Other",
        quantity: parseInt(quantity) || 0,
        createdAt: serverTimestamp()
      });

      showToast("✅ Product added successfully!");

      // Clear form
      ["name","price","image","category","quantity"].forEach(id => {
        const el = document.getElementById(id);
        el.tagName === "SELECT" ? (el.selectedIndex = 0) : (el.value = "");
      });

    } catch (err) {
      console.error("Firestore error:", err);
      showToast("❌ Failed to add product: " + err.message, "error");
    } finally {
      addBtn.disabled          = false;
      addSpinner.style.display = "none";
      addBtnText.textContent   = "Add Product";
    }
  });

  // ── REAL-TIME PRODUCT LIST ─────────────────────────────────
  const q = query(collection(db, "products"), orderBy("createdAt", "desc"));

  onSnapshot(q, (snapshot) => {
    const products = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

    // update stats
    const totalQty  = products.reduce((s, p) => s + (parseInt(p.quantity) || 0), 0);
    const cats      = new Set(products.map(p => p.category).filter(Boolean)).size;
    document.getElementById("statTotal").textContent = products.length;
    document.getElementById("statCats").textContent  = cats;
    document.getElementById("statStock").textContent = totalQty;
    document.getElementById("productCountBadge").textContent =
      `${products.length} product${products.length !== 1 ? "s" : ""}`;

    if (products.length === 0) {
      tableBody.innerHTML = `
        <tr><td colspan="6">
          <div class="empty-state">
            <span class="icon">📭</span>
            No products yet. Add your first product!
          </div>
        </td></tr>`;
      return;
    }

    tableBody.innerHTML = products.map(p => `
      <tr>
        <td>
          ${p.image
            ? `<img src="${escHtml(p.image)}" class="product-thumb" alt="${escHtml(p.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
               <div class="product-thumb-placeholder" style="display:none">🖼️</div>`
            : `<div class="product-thumb-placeholder">🖼️</div>`}
        </td>
        <td><strong>${escHtml(p.name)}</strong></td>
        <td><span class="price-tag">₹${Number(p.price).toLocaleString('en-IN')}</span></td>
        <td><span class="cat-badge">${escHtml(p.category || "—")}</span></td>
        <td>${p.quantity ?? 0}</td>
        <td style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-sm btn-edit" data-id="${p.id}"
            data-name="${escAttr(p.name)}"
            data-price="${p.price}"
            data-image="${escAttr(p.image || '')}"
            data-category="${escAttr(p.category || '')}"
            data-quantity="${p.quantity ?? 0}">
            Edit
          </button>
          <button class="btn btn-sm btn-danger" data-delete="${p.id}">
            Delete
          </button>
        </td>
      </tr>`).join("");
  }, (err) => {
    console.error("Snapshot error:", err);
    tableBody.innerHTML = `
      <tr><td colspan="6">
        <div class="empty-state" style="color:#ef4444">
          <span class="icon">⚠️</span>
          Firebase error: ${escHtml(err.message)}
        </div>
      </td></tr>`;
  });

  // ── DELETE ─────────────────────────────────────────────────
  tableBody.addEventListener("click", async function (e) {
    const delBtn = e.target.closest("[data-delete]");
    if (delBtn) {
      if (!confirm("Delete this product?")) return;
      try {
        await deleteDoc(doc(db, "products", delBtn.dataset.delete));
        showToast("🗑️ Product deleted");
      } catch (err) {
        showToast("❌ Delete failed: " + err.message, "error");
      }
    }

    const editBtn = e.target.closest("[data-id]");
    if (editBtn) openEditModal(editBtn.dataset);
  });

  // ── EDIT MODAL ─────────────────────────────────────────────
  function openEditModal(data) {
    document.getElementById("editId").value       = data.id;
    document.getElementById("editName").value     = data.name;
    document.getElementById("editPrice").value    = data.price;
    document.getElementById("editImage").value    = data.image;
    document.getElementById("editCategory").value = data.category;
    document.getElementById("editQuantity").value = data.quantity;
    editOverlay.classList.add("open");
  }

  function closeModal() { editOverlay.classList.remove("open"); }

  closeModalBtn.addEventListener("click", closeModal);
  cancelEditBtn.addEventListener("click", closeModal);
  editOverlay.addEventListener("click", e => { if (e.target === editOverlay) closeModal(); });

  saveEditBtn.addEventListener("click", async function () {
    const id       = document.getElementById("editId").value;
    const name     = document.getElementById("editName").value.trim();
    const price    = document.getElementById("editPrice").value.trim();
    const image    = document.getElementById("editImage").value.trim();
    const category = document.getElementById("editCategory").value;
    const quantity = document.getElementById("editQuantity").value.trim();

    if (!name || !price) { showToast("Name and Price required", "error"); return; }

    saveEditBtn.disabled = true;
    saveEditBtn.textContent = "Saving…";

    try {
      await updateDoc(doc(db, "products", id), {
        name,
        price:    parseFloat(price),
        image:    image || "",
        category: category || "Other",
        quantity: parseInt(quantity) || 0
      });
      showToast("✅ Product updated!");
      closeModal();
    } catch (err) {
      showToast("❌ Update failed: " + err.message, "error");
    } finally {
      saveEditBtn.disabled = false;
      saveEditBtn.textContent = "Save Changes";
    }
  });

  // ── Escape helpers ────────────────────────────────────────
  function escHtml(str) {
    return String(str ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function escAttr(str) {
    return String(str ?? "").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
</script>
</body>
  </html>
