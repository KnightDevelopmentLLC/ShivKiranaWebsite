<!DOCTYPE html>
<html>
<head>
  <title>Shiv Kirana</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Shiv Kirana</h1>

<div id="categories"></div>
<div id="products"></div>

<h2>Cart</h2>
<div id="cart"></div>
<h3 id="total"></h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<button onclick="order()">Order on WhatsApp</button>

<script type="module">
import { db } from "./firebase.js";
import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let allProducts = [];
let cart = [];

onSnapshot(collection(db,"products"), snap=>{
  allProducts = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderProducts();
  renderCategories();
});

function renderCategories(){
  let cats = ["All", ...new Set(allProducts.map(p=>p.category))];
  document.getElementById("categories").innerHTML = cats.map(c=>
    `<button onclick="filter('${c}')">${c}</button>`
  ).join("");
}

window.filter = (cat)=>{
  if(cat==="All") renderProducts();
  else renderProducts(allProducts.filter(p=>p.category===cat));
};

function renderProducts(list=allProducts){
  document.getElementById("products").innerHTML = list.map(p=>`
    <div class="card">
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick='add(${JSON.stringify(p)})'>Add</button>
    </div>
  `).join("");
}

window.add = (p)=>{
  let item = cart.find(i=>i.id===p.id);
  if(item) item.qty++;
  else cart.push({...p, qty:1});
  renderCart();
};

function renderCart(){
  let total = 0;
  document.getElementById("cart").innerHTML = cart.map(c=>{
    total += c.price*c.qty;
    return `<p>${c.name} x ${c.qty}</p>`;
  }).join("");
  document.getElementById("total").innerText = "Total: ₹"+total;
}

window.order = ()=>{
  let msg = "Order:\n";
  cart.forEach(c=> msg+=`${c.name} x ${c.qty}\n`);
  msg += document.getElementById("name").value;
  window.open("https://wa.me/91XXXXXXXXXX?text="+encodeURIComponent(msg));
};
</script>

</body>
</html>
